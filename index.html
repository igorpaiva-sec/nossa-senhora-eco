<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossas Senhoras Ecológicas</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; height: 100%; }
body { font-family: system-ui, sans-serif; background: #0d2e5a; }

#cw {
  width: 100%;
  max-width: 960px;
  min-height: 100vh;
  margin: 0 auto;
  font-family: Georgia, serif;
  background: #0d2e5a;
  position: relative;
  overflow: hidden;
  padding: 2.25rem 1.5rem 2.75rem;
}

#cw::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 18% 28%, rgba(255,255,255,.04) 0%, transparent 50%),
    radial-gradient(circle at 82% 72%, rgba(255,255,255,.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.03) 40px);
  pointer-events: none;
  z-index: 0;
}

#bg-ns {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center top;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
}

.layer { position: relative; z-index: 1; }

#hdr { text-align: center; margin-bottom: 1.75rem; }
#hdr-title { font-size: clamp(18px, 4vw, 28px); font-weight: 700; color: #e8f0fb; letter-spacing: .07em; text-transform: uppercase; }
#hdr-sub { font-size: 13px; color: #8fb3d9; margin-top: .35rem; letter-spacing: .06em; }
#hdr-rule { width: 70px; height: 2px; background: linear-gradient(90deg, transparent, #4a90d9, transparent); margin: .85rem auto 0; }

#stage {
  background: rgba(6, 20, 46, .55);
  border: 1px solid rgba(90, 140, 210, .25);
  border-radius: 18px;
  overflow: hidden;
  backdrop-filter: blur(6px);
}

.slide {
  display: none;
  flex-direction: row;
  align-items: stretch;
  min-height: 380px;
}
.slide.active {
  display: flex;
  animation: sldIn .5s ease;
}
@keyframes sldIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.col-text {
  flex: 0 0 42%;
  padding: 2.25rem 2rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 1px solid rgba(90, 140, 210, .2);
}
.col-text h3 {
  font-size: 13px;
  font-weight: 700;
  color: #7ab3e8;
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 1rem;
}
.col-text p {
  font-size: 13.5px;
  line-height: 1.8;
  color: #c8daf0;
  margin-top: .85rem;
}
.col-text p:first-of-type { margin-top: 0; }

.col-img {
  flex: 0 0 58%;
  padding: 1.75rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.col-img img {
  max-width: 100%;
  max-height: 300px;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 6px 28px rgba(0, 0, 0, .55);
  background: #0a1e40;
  display: block;
}
.img-caption {
  font-size: 12px;
  color: #8fb3d9;
  text-align: center;
  letter-spacing: .04em;
}
.img-name {
  font-size: 15px;
  font-weight: 600;
  color: #d4e6f9;
  text-align: center;
  margin-top: .3rem;
}

#nav-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  margin-top: 1.5rem;
}
.nav-btn {
  background: rgba(90, 150, 220, .18);
  color: #8fb3d9;
  border: 1px solid rgba(90, 150, 220, .4);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, color .2s, transform .2s;
}
.nav-btn:hover {
  background: rgba(90, 150, 220, .45);
  color: #fff;
  transform: scale(1.1);
}
#dots { display: flex; gap: 9px; align-items: center; }
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(143, 179, 217, .28);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background .25s, transform .25s;
}
.dot.active { background: #4a90d9; transform: scale(1.35); }
.dot:hover { background: rgba(143, 179, 217, .55); }
#counter {
  font-size: 12px;
  color: #8fb3d9;
  min-width: 36px;
  text-align: center;
}

#audio-btn {
  position: fixed;
  right: 1rem;
  top: 1rem;
  z-index: 999;
  background: #4a90d9;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (max-width: 640px) {
  .slide.active { flex-direction: column; }
  .slide { min-height: auto; }
  .col-text {
    flex: none;
    border-right: none;
    border-bottom: 1px solid rgba(90, 140, 210, .2);
    padding: 1.5rem 1.25rem;
  }
  .col-img {
    flex: none;
    padding: 1.25rem 1rem;
  }
  .col-img img { max-height: 230px; }
  .col-text p { font-size: 13px; }
}

</style>
</head>
<body>

  <audio id="bg-audio" loop>
    <source src="https://raw.githubusercontent.com/igorpaiva-sec/Nossa-Senhora-Eco/main/musica.mp3" type="audio/mpeg">
  </audio>

  <button id="audio-btn">🔊</button>

  <div id="cw">
    <img id="bg-ns" src="https://i.imgur.com/6Lplyla.jpeg" alt="" aria-hidden="true">

    <div class="layer">
      <div id="hdr">
        <p id="hdr-title">Exposição Mariana</p>
        <p id="hdr-sub">6º Ano &nbsp;·&nbsp; Mês de Maria &nbsp;·&nbsp; Arte com garrafas PET</p>
        <div id="hdr-rule"></div>
      </div>

      <div id="stage" role="region" aria-live="polite"></div>

      <div id="nav-row">
        <button class="nav-btn" id="btn-prev">&#8592;</button>
        <div id="dots" role="tablist"></div>
        <span id="counter">1 / 1</span>
        <button class="nav-btn" id="btn-next">&#8594;</button>
      </div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var GITHUB_REPO = 'https://raw.githubusercontent.com/igorpaiva-sec/Nossa-Senhora-Eco/main';
  var JSON_URL = GITHUB_REPO + '/imagens.json';

  var audio = document.getElementById('bg-audio');
  var audioBtn = document.getElementById('audio-btn');
  var isPlaying = false;

  audioBtn.addEventListener('click', function () {
    if (isPlaying) {
      audio.pause();
      audioBtn.textContent = '🔊';
      isPlaying = false;
    } else {
      audio.play().catch(function (err) {
        console.log('Autoplay bloqueado:', err);
      });
      audioBtn.textContent = '⏸️';
      isPlaying = true;
    }
  });

  // Carregar fotos do JSON com retry
  var attempt = 0;
  var stage = document.getElementById('stage');
  var dotsEl = document.getElementById('dots');
  var counterEl = document.getElementById('counter');
  var timer = null;
  var INTERVAL = 4000;
  var dots = [];
  var cur = 0;

  function loadCarousel() {
    fetch(JSON_URL, { cache: 'no-store' })
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(function (data) {
        if (!data.fotos || data.fotos.length === 0) {
          throw new Error('Nenhuma foto encontrada no JSON');
        }
        initCarousel(data.fotos);
      })
      .catch(function (err) {
        attempt++;
        if (attempt < 3) {
          console.log('Tentativa ' + attempt + ' falhou. Tentando novamente em 2s...');
          setTimeout(loadCarousel, 2000);
        } else {
          console.error('Erro ao carregar:', err);
          stage.innerHTML = '<p style="color:#c8daf0; padding:2rem; font-size:12px;">' +
            'Erro ao carregar as fotos: ' + err.message + '<br><br>' +
            'As imagens HEIC precisam ser convertidas para JPG para os navegadores exibirem' +
            '</p>';
        }
      });
  }

  function initCarousel(fotos) {
    var total = fotos.length;

    // Gerar slides
    fotos.forEach(function (foto, idx) {
      var slide = document.createElement('div');
      slide.className = 'slide' + (idx === 0 ? ' active' : '');
      
      var urlFoto = GITHUB_REPO + '/' + foto.arquivo;
      
      slide.innerHTML = '' +
        '<div class="col-text">' +
        '  <h3>Fé e sustentabilidade</h3>' +
        '  <p>Os alunos do 6º ano realizaram um belíssimo trabalho em homenagem ao Mês de Maria, unindo criatividade, pesquisa e devoção.</p>' +
        '  <p>Como culminância dos estudos sobre Maria, Mãe de Jesus, os estudantes pesquisaram diversos títulos marianos e suas representações na fé cristã, aprofundando o conhecimento sobre a importância de Nossa Senhora na vida da Igreja.</p>' +
        '  <p>Para tornar esse momento ainda mais especial, os alunos transformaram garrafas PET de 2 litros em peças decorativas inspiradas nas devoções marianas, demonstrando consciência ambiental, sensibilidade artística e espiritualidade.</p>' +
        '  <p>O resultado foi uma exposição rica em significado, beleza e dedicação, refletindo o carinho e o respeito de todos por Maria.</p>' +
        '</div>' +
        '<div class="col-img">' +
        '  <img src="' + urlFoto + '" alt="Nossa Senhora Ecológica" loading="lazy">' +
        '  <div>' +
        '    <p class="img-caption">Nossa Senhora Ecológica</p>' +
        '    <p class="img-name">' + foto.nome + '</p>' +
        '  </div>' +
        '</div>';
      
      stage.appendChild(slide);
    });

    var slides = document.querySelectorAll('.slide');

    // Gerar dots
    for (var i = 0; i < total; i++) {
      (function (idx) {
        var btn = document.createElement('button');
        btn.className = 'dot' + (idx === 0 ? ' active' : '');
        btn.setAttribute('role', 'tab');
        btn.addEventListener('click', function () { goTo(idx); reset(); });
        dotsEl.appendChild(btn);
        dots.push(btn);
      })(i);
    }

    function update() {
      slides.forEach(function (s, i) { s.classList.toggle('active', i === cur); });
      dots.forEach(function (d, i) { d.classList.toggle('active', i === cur); });
      counterEl.textContent = (cur + 1) + ' / ' + total;
    }

    function goTo(n) { cur = (n + total) % total; update(); }
    function next() { goTo(cur + 1); }
    function prev() { goTo(cur - 1); }
    function start() { clearInterval(timer); timer = setInterval(next, INTERVAL); }
    function reset() { start(); }

    document.getElementById('btn-next').addEventListener('click', function () { next(); reset(); });
    document.getElementById('btn-prev').addEventListener('click', function () { prev(); reset(); });

    stage.addEventListener('mouseenter', function () { clearInterval(timer); });
    stage.addEventListener('mouseleave', start);

    var touchStartX = 0;
    stage.addEventListener('touchstart', function (e) {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    stage.addEventListener('touchend', function (e) {
      var diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) { diff > 0 ? next() : prev(); reset(); }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') { next(); reset(); }
      if (e.key === 'ArrowLeft') { prev(); reset(); }
    });

    update();
    start();
  }

  loadCarousel();
})();
</script>

</body>
</html>
